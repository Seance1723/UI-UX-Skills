name: Feature request
description: Suggest a new workflow, template, agent integration, MCP capability, or documentation improvement.
title: "Feature: "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What user or maintainer problem should this solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: Describe the change and how it would be used.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches, trade-offs, or compatibility concerns.
